target-version = "py312"
line-length = 88
exclude = [".venv", "venv", "__pycache__", "migrations", ".git"]

[format]
indent-style = "space"
quote-style = "double"
docstring-code-format = true

[lint]
select = ["E","F","W","I","UP","B","SIM","C4","PIE"] # for a list of all rules refer: https://docs.astral.sh/ruff/rules/
ignore = ["E501"]
fixable = ["ALL"]

[lint.per-file-ignores]
"**/settings.py" = ["F401"]
"**/__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["users"]
